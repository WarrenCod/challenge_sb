# @package _global_
# ViT-S/16 (MAE-pretrained in Stage 1) + mean-pool temporal + linear classifier.
# Stage 2 baseline. The MAE checkpoint is loaded at construction by ViTMAEEncoder.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
    drop_path: 0.1
  temporal:
    name: mean_pool
  classifier:
    name: linear
