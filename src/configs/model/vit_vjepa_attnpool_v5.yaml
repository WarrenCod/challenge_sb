# @package _global_
# Frozen-encoder probe on V-JEPA v5 (SOTA-adapted) with attention pooling.
# Encoder: V-JEPA v5 ViT-S/16 (tubelet=2), frozen. Head matches the v9_attnpool
# baseline used to establish the Tier-2 probe ceiling, so v5 vs Tier-2 is
# apples-to-apples.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/vjepa_stage1_v5.pt
    drop_path: 0.0
    pool: attn_pool
    freeze: true
    tubelet_size: 2
    num_frames: 4
  temporal:
    name: mean_pool
  classifier:
    name: linear
