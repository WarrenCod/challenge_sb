# @package _global_
# Frozen-encoder probe on V-JEPA v7. ViT-S/16, tubelet_size=2 (matches the v7
# Stage-1 encoder). Used by exp9_vjepa_probe_v7 to evaluate the pass-gate
# (real-val top-1 >= 0.105) via evaluate.py on the full val_dir.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/vjepa_stage1_v7.pt
    drop_path: 0.0
    pool: attn_pool
    freeze: true
    tubelet_size: 2
    num_frames: 4
  temporal:
    name: mean_pool
  classifier:
    name: linear
