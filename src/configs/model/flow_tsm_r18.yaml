# @package _global_
# Flow-only single-stream model. Mirrors the flow branch of two_stream_tsm.yaml
# verbatim: TSM-ResNet18 (2-channel dx/dy input, T-1 segments) + 2-layer
# Transformer (in_proj 256) + MLP classifier. Used as a diagnostic to measure
# what an optical-flow-only stream contributes on this dataset before
# committing to a joint two-stream training run.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: resnet_tsm
    variant: resnet18
    num_segments: 3            # T - 1 = 4 - 1 (flow pairs)
    fold_div: 8
    pretrained: false
    in_channels: 2
  temporal:
    name: transformer
    in_proj_dim: 256
    num_heads: 8
    num_layers: 2
    dim_feedforward: 1024
    dropout: 0.15
  classifier:
    name: mlp
    hidden_dim: 256
    dropout: 0.3
