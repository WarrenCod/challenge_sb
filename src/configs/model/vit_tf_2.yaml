# @package _global_
# vit-tf-2 model: ViT-Ti/16 (scratch) -> 2-layer Transformer -> MLP head.
#
# Smaller backbone than vit_transformer_mlp v1 (Ti=5.7M vs S=22M params).
# v1 was gradient-starved — train acc plateaued at 7.5% even before convergence —
# so capacity was not the bottleneck; the smaller model gets more signal per param
# and converges faster on 36k 4-frame clips.
#
# pool=cls_avg keeps both CLS and mean-of-patches (out_dim = 2 * 192 = 384).
# Temporal head is sized to the actual token count (CLS + T=4 frames = 5 tokens):
# 2 layers is plenty; 4 layers would be wasted depth on a length-5 sequence.
# 6 heads × 64-dim each = 384 (must divide cls_avg out_dim).
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit
    variant: vit_ti_16
    pretrained: false
    pool: cls_avg              # out_dim = 2 * 192 = 384
    drop_path: 0.05            # mild — model needs to learn first
  temporal:
    name: transformer
    num_heads: 6               # 384 / 6 = 64 per head
    num_layers: 2              # only 5 tokens, no need for depth
    dropout: 0.1
    drop_path: 0.0
  classifier:
    name: mlp
    hidden_dim: 384
    dropout: 0.2               # down from 0.5 in v1 — was suppressing learning
