# @package _global_
# Frozen-encoder linear probe on V-JEPA Tier-1 (per-frame, multi-frame masked) features.
# Encoder: V-JEPA Tier-1 ViT-S/16, tubelet=1, pool=mean_patches.
# Temporal: mean over T. Classifier: Linear(384, 33).
# Apples-to-apples vs vit_vjepa_probe_tier2 (same recipe; the only difference
# is which Stage-1 ckpt is loaded). A/B tells us whether the tubelet=2 head
# in Tier-2 actually carries more class signal than the per-frame Tier-1 head.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/vjepa_stage1.tier1_ema996.pt
    drop_path: 0.0
    pool: mean_patches
    freeze: true
  temporal:
    name: mean_pool
  classifier:
    name: linear
