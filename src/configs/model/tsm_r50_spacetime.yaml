# @package _global_
# TSM-ResNet50 backbone + divided space-time Transformer head over the pre-pool
# layer4 feature map. With image_size=256, layer4 emits 8x8 spatial tokens →
# T=4 × H*W=64 = 256 patch tokens fed to a 4-layer divided ST transformer
# (TimeSformer-style: temporal MHSA, then spatial MHSA, then FFN per block).
# Readout = mean over output tokens (no CLS) → MLP classifier.
# Track 1 (from scratch — no ImageNet weights).
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: resnet_tsm
    variant: resnet50
    num_segments: ${dataset.num_frames}
    fold_div: 8
    pretrained: false
  temporal:
    name: spacetime_transformer
    in_proj_dim: 512
    num_heads: 8
    num_layers: 4
    dim_feedforward: 2048
    dropout: 0.15
    drop_path: 0.1
    max_t: 8
    max_s: 256
  classifier:
    name: mlp
    hidden_dim: 512
    dropout: 0.3
