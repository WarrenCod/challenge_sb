# @package _global_
# ViT-S/16 (MAE-pretrained) + Perceiver temporal head over the FULL per-frame
# token sequence (1 CLS + 196 patch tokens), not just the CLS.
# 16 learnable queries cross-attend to (T*(N+1)) keys/values, then a 3-layer
# self-attention tower runs on the queries; mean-pool -> linear classifier.
#
# vs vit_mae_relational_transformer (exp2h):
#   - spatial: returns full (B, T, N+1, D) instead of per-frame CLS
#   - temporal: PerceiverHead, 3 layers, 16 queries (vs RelationalTransformer
#     on 8 tokens with 3 layers). Same depth; different input bandwidth.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
    drop_path: 0.1
    return_all_tokens: true   # NEW: expose per-frame patch tokens to the head
  temporal:
    name: perceiver
    num_queries: 16
    num_heads: 6              # ViT-S width / 64
    num_layers: 3             # matches relational_transformer for clean A/B
    mlp_ratio: 4.0
    dropout: 0.1
    max_frames: 4
  classifier:
    name: linear
