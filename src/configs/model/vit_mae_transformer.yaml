# @package _global_
# ViT-S/16 (MAE-pretrained in Stage 1) + 2-layer temporal transformer + linear classifier.
# Stage 2 baseline with order-aware temporal head (vs vit_mae_meanpool's mean-pool).
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
    drop_path: 0.1
  temporal:
    name: transformer
    num_heads: 6           # ViT-S width / 64
    num_layers: 2
    dim_feedforward: 1536  # 4 * embed_dim
    dropout: 0.1
    max_len: 8             # >= num_frames; cheap to leave room
  classifier:
    name: linear
