# @package _global_
# DINOv2 ViT-S/14 (reg4, pretrained on LVD-142M) -> 2-layer Transformer -> MLP head.
#
# Track-2 fine-tune. The DINOv2 backbone is the strongest off-the-shelf image
# ViT-S available; reg4 is the paper's recommended downstream variant.
#
# pool=cls_avg keeps both CLS (global) and mean-of-patches (fine-grained motion)
# -> spatial.out_dim = 2 * 384 = 768. Temporal head sized to that:
#   12 heads * 64-dim each = 768 (768 / 12 = 64).
# Only 5 tokens (CLS + T=4 frames) so 2 layers is plenty; more would be wasted.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: dinov2
    variant: vit_small_patch14_reg4_dinov2.lvd142m
    pretrained: true
    pool: cls_avg              # out_dim = 2 * 384 = 768
    drop_path: 0.1             # mild stochastic depth on the pretrained ViT
    freeze_backbone: false     # full fine-tune via LLRD
    image_size: 224            # 16 * 14 = 224
  temporal:
    name: transformer
    num_heads: 12              # 768 / 12 = 64 per head
    num_layers: 2              # only 5 tokens, no need for depth
    dropout: 0.1
    drop_path: 0.0
  classifier:
    name: mlp
    hidden_dim: 768
    dropout: 0.2
