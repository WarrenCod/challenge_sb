# @package _global_
# ViT (spatial) + Transformer (temporal) + MLP (classifier) — Track 1 (scratch).
#
# - vit_s_16 from scratch: ImageNet weights are forbidden in Track 1.
# - pool=cls_avg gives 2*hidden_dim per frame (CLS concatenated with mean of patch tokens).
#   Patch tokens carry the fine-grained motion signal that SSv2-style data depends on.
# - Stochastic-depth (drop_path) on both the ViT and the temporal transformer to keep
#   the head from memorising 36k training clips.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit
    variant: vit_s_16
    pretrained: false
    pool: cls_avg              # out_dim = 2 * 384 = 768
    drop_path: 0.1
  temporal:
    name: transformer
    num_heads: 8
    num_layers: 4
    dropout: 0.1
    drop_path: 0.1
  classifier:
    name: mlp
    hidden_dim: 768
    dropout: 0.5
