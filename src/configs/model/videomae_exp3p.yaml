# @package _global_
# Stage 2 exp3p — VideoMAE encoder + divided-ST blocks in last K=4 layers
# + Perceiver head (4 SA layers, sinusoidal+learnable_scale temporal pos)
# + linear classifier.
#
# "Learn only by yourself": EMA-self distillation only (your own moving
# average). No external teacher checkpoint. Pair-direction aux + multi-clip
# consistency + SWA + (optional) pseudo-label fine-tune supply the extra
# signal at training time.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: videomae_vit
    variant: vit_s_16
    image_size: 224
    num_frames: 4
    tubelet_time: 2
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/videomae_stage1.pt
    drop_path: 0.30
    drop_path_schedule: linear      # 0.0 (block 0) → 0.30 (block 11), per-block
    return_all_tokens: true         # (B, T'=2, H'·W'=196, D=384)
    space_time_layers: 4            # wrap last 4 ViT blocks as VideoMAESpaceTimeBlock
  temporal:
    name: perceiver
    num_queries: 16
    num_heads: 6
    num_layers: 4                   # exp3a uses 4 (was 3 in exp2*)
    mlp_ratio: 4.0
    dropout: 0.30
    max_frames: 2                   # T' = num_frames / tubelet_time
    temporal_pos_init: sinusoidal_fixed_with_scale  # order-aware @ step 0
  classifier:
    name: linear
