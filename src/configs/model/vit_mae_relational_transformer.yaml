# @package _global_
# ViT-S/16 (MAE-pretrained) + 3-layer Relational Transformer + linear classifier.
# The temporal head sees [CLS, frame_t (×T), delta_t (×T-1)] tokens with
# learned type embeddings — explicit differencing without channel-doubling.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
    drop_path: 0.1
  temporal:
    name: relational_transformer
    num_heads: 6           # ViT-S width / 64
    num_layers: 3          # bumped from 2 to match the larger token count (8 vs 5)
    dim_feedforward: 1536  # 4 * embed_dim
    dropout: 0.1
    max_len: 8             # >= num_frames; cheap to leave room
  classifier:
    name: linear
