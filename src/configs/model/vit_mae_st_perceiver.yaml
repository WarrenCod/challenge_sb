# @package _global_
# ViT-S/16 (MAE-pretrained) with TimeSformer-style divided space-time
# attention in the last K blocks, plus the exp2k Perceiver temporal head over
# the full per-frame token sequence.
#
# Key diff vs vit_mae_perceiver (exp2k):
#   - spatial.space_time_layers: K>0 wraps the last K ViT blocks. Each wrapped
#     block runs a temporal-attention pre-pass (over T tokens at each patch
#     position) before its (MAE-init) spatial attn + MLP. Output projection
#     of the temporal MHA is zero-init so the t=0 forward equals exp2k's.
#   - spatial.space_time_num_frames pinned to dataset.num_frames.
model:
  name: modular
  num_classes: ${num_classes}
  spatial:
    name: vit_mae
    variant: vit_s_16
    image_size: 224
    checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
    drop_path: 0.1
    return_all_tokens: true
    space_time_layers: 4
    space_time_num_frames: 4
  temporal:
    name: perceiver
    num_queries: 16
    num_heads: 6
    num_layers: 3
    mlp_ratio: 4.0
    dropout: 0.1
    max_frames: 4
  classifier:
    name: linear
