# Main Hydra config: composes model, data, train, and experiment bundle.
# Run from `src/`:  python train.py experiment=cnn_lstm
defaults:
  - _self_                                # base values; defaults below merge ON TOP
  - model: cnn_baseline
  - data: default
  - train: default
  - experiment: baseline_from_scratch     # experiment cfg has the final say

# Optional: where Hydra stores run outputs (checkpoints printed in train.py)
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}

num_classes: 33

# Submission / evaluate-time TTA defaults. Per-experiment configs may override.
submission:
  tta_clips: 1
  spatial_crops: 1        # 1 (default) or 5 (TL/TR/BL/BR/center spatial TTA)
  spatial_resize: 256     # frame resize when spatial_crops > 1 (5-crop sees 256→224)
  dump_probs: false

# Weights & Biases logging (off by default; switch on per-experiment).
wandb:
  enabled: false
  project: csc43m04ep
  entity: null              # default to your wandb default entity
  mode: online              # online | offline | disabled
  run_name: null            # null → use checkpoint stem (set in experiment cfg if needed)
  run_id: null              # set for explicit cross-restart resume of the same run
  tags: []
