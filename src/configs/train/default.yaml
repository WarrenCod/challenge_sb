# @package _global_
training:
  batch_size: 8
  lr: 0.0001
  epochs: 5
  num_workers: 2
  # Where to save the best checkpoint (by validation accuracy)
  checkpoint_path: ${hydra:runtime.cwd}/best_model.pt
  device: cuda
  # Off by default so existing experiments reproduce bit-for-bit.
  amp: false
  weight_decay: 0.0
  warmup_epochs: 0
  grad_clip: 0.0
  # If true and <checkpoint_path>_last.pt exists with a matching config hash,
  # resume model+optimizer+scheduler+scaler+RNG from it. Set false to force
  # a fresh run (the existing _last file will be overwritten from epoch 0).
  resume: true
