# @package _global_
# Stage 2 — supervised fine-tune of the MAE-pretrained ViT-S encoder
# with a mean-pool temporal head and linear classifier. Track 1.
defaults:
  - override /model: vit_mae_meanpool

dataset:
  num_frames: 4

training:
  batch_size: 32            # 32 clips × 4 frames = 128 images per batch
  lr: 1.0e-3                # head LR; encoder layers decayed via LLRD
  llrd: 0.75                # layer-wise LR decay factor
  epochs: 30
  warmup_epochs: 5
  weight_decay: 0.05
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage2.pt
  device: cuda
