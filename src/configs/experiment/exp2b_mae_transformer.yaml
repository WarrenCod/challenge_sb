# @package _global_
# Exp2b (Track 1): exp2 + heavy regularization to close the train/val gap.
# exp2 hit val_best 0.5212 with train_acc 0.994 (47-pp gap, val_loss climbs
# for 35 epochs after peak) — near-pure memorization. Same encoder, same
# temporal head, same num_frames=4. Changes vs exp2:
#   - strong_clip_aug: true   → ConsistentClipAug (RandomResizedCrop +
#                               ColorJitter + RandAugment + RandomErasing,
#                               applied identically across frames; SSv2-safe,
#                               no hflip).
#   - mixup_alpha: 0.2        → wired through train_one_epoch.
#   - drop_path 0.1 → 0.2     → spatial encoder.
#   - temporal dropout 0.1 → 0.2.
defaults:
  - override /model: vit_mae_transformer

model:
  spatial:
    drop_path: 0.2
  temporal:
    dropout: 0.2

dataset:
  num_frames: 4

training:
  batch_size: 16
  lr: 3.0e-4
  llrd: 0.75
  epochs: 50
  warmup_epochs: 5
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.2
  strong_clip_aug: true
  amp: true
  grad_clip: 1.0
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp2b_mae_transformer.pt
  device: cuda

wandb:
  enabled: true
  run_name: exp2b_mae_transformer
  tags: [track1, stage2, mae, transformer, regularized]
