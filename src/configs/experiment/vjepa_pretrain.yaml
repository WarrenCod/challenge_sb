# @package _global_
# Stage 1 — V-JEPA Tier-0 (frame-pair JEPA, bidirectional, narrow predictor).
# Entry point: `python src/pretrain_vjepa.py experiment=vjepa_pretrain`
# Saves the EMA target encoder under `encoder_state_dict` in MAE/iBOT key
# layout, so Stage 2 loads it via the existing ViTMAEEncoder.

vjepa:
  variant: vit_s_16
  image_size: 224
  patch_size: 16
  num_frames: 4
  predictor_dim: 128
  predictor_depth: 4
  predictor_heads: 4

training:
  batch_size: 256
  base_lr: 1.5e-4               # effective lr = base_lr * batch_size / 256
  final_lr: 1.0e-6
  weight_decay: 0.05
  warmup_epochs: 10
  epochs: 200
  amp: true                     # bf16 on the A5000 (no GradScaler needed)
  num_workers: 8
  grad_clip: 3.0
  ema_momentum_start: 0.996
  ema_momentum_end: 1.0
  loss_beta: 2.0
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/vjepa_stage1.pt
  device: cuda
  # NaN/Inf guard: skip backward+step+EMA when the loss is non-finite. After
  # this many non-finite steps in a row, abort (predictor is wedged).
  max_nonfinite_streak: 50
  # Early stop: bail out if best train loss hasn't improved by `min_delta`
  # for `patience` epochs. `min_epochs` floors the run length so we never
  # stop before warmup + the early plateau has settled.
  early_stop_patience: 25
  early_stop_min_delta: 1.0e-4
  early_stop_min_epochs: 60

wandb:
  enabled: true
  tags: [track1, stage1, vjepa]
