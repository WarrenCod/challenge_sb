# @package _global_
# exp10 (Track 1): V-JEPA v7 (hybrid V-JEPA + pixel-MAE) Stage-2 fine-tune.
# Same head topology as exp8 (joint space-time transformer over patch tokens),
# but loads the v7 ViT-S/16 encoder (tubelet=2). Tighter LLRD (0.70 vs exp8's
# 0.75) pushes the head to do more semantic work since v7's encoder features
# should be richer than v6's appearance-only features.
#
# Recipe: strong clip aug, mixup 0.2, drop_path 0.2 (encoder), dropout 0.2 (head),
# label smoothing 0.1, weight decay 0.05, EMA 0.9999. Head fresh random init,
# encoder fully trainable with LLRD. 80 ep (shorter than exp8's 300 — v7 encoder
# should converge faster than the appearance-only v6 baseline).
#
# Hard 20-ep gate: kill if val_acc < 0.20 by epoch 20.
defaults:
  - override /model: vit_vjepa_spacetime_v7

dataset:
  num_frames: 4

training:
  batch_size: 16
  lr: 5.0e-4
  llrd: 0.70
  epochs: 80
  warmup_epochs: 5
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.2
  strong_clip_aug: true
  amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema: true
  ema_decay: 0.9999
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp10_vjepa_v7_spacetime.pt
  device: cuda

wandb:
  enabled: true
  run_name: exp10_vjepa_v7_spacetime
  tags: [track1, stage2, vjepa, v7, hybrid, spacetime, joint-attn, regularized, ema]
  notes: |
    Stage-2 fine-tune of V-JEPA v7 (hybrid V-JEPA + pixel-MAE) ViT-S/16 encoder.
    LLRD 0.70 on encoder, head fresh random init. mixup 0.2, label smooth 0.1,
    EMA 0.9999. 80 ep, batch 16, lr 5e-4 (head, scaled via LLRD into encoder).
    Target: real val ≥ 0.50, stretch 0.55. Current Track-1 leader: 0.3899.
