# @package _global_
# Exp8 (Track 2): scale-up of exp7 along four orthogonal axes:
#   1. backbone:    resnet50 -> resnet101 (ImageNet pretrained — Track 2)
#   2. resolution:  224 -> 256
#   3. temporal:    transformer 2 layers -> 4 layers, in_proj 512 -> 768, d_ff 2048 -> 3072
#   4. inference:   single-clip -> 4-clip temporal TTA in create_submission.py
#
# Reg recipe (mixup, EMA, label-smoothing, aux head, strong_clip_aug, weight_decay)
# is held constant at exp7's values so the delta vs exp7 attributes to the four
# capacity/scale changes above. ImageNet pretraining lets us drop the backbone LR
# to a standard fine-tuning rate while keeping the head LR at exp7's value.
#
# Memory: R101 + 256² + T=4 is ~2.5× exp7's footprint at bs=16; start at bs=8.

defaults:
  - override /model: tsm_resnet50_transformer_mlp

model:
  spatial:
    variant: resnet101
    pretrained: true
  temporal:
    in_proj_dim: 768
    num_heads: 8
    num_layers: 4
    dim_feedforward: 3072
    dropout: 0.15

dataset:
  num_frames: 4
  image_size: 256

training:
  optimizer: adamw
  lr: 5.0e-4               # head LR (temporal + classifier + aux head)
  backbone_lr: 1.0e-4      # pretrained R101 — standard fine-tuning rate
  weight_decay: 0.05
  batch_size: 8            # tune in smoke test; R101 + 256² is heavier
  epochs: 220
  warmup_epochs: 15
  lr_schedule: cosine
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  ema: true
  ema_decay: 0.9995
  strong_clip_aug: true
  mixup_alpha: 0.2
  aux_loss:
    enabled: true
    weight: 0.3
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp8_tsm_r101_big.pt
  device: cuda

wandb:
  enabled: true
  run_name: tsm-r101-tf4-mlp-256-tta
  tags: [track2, pretrained, tsm, resnet101, transformer, mlp, aux, ema, big]
