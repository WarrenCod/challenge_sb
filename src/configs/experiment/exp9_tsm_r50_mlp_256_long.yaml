# @package _global_
# Exp9 (Track 1): exp7 recipe + two scale changes, no pretraining.
#
# exp7 peaked at val_acc=0.576 (epoch 198/220) with train_acc=0.533 — val>train
# from mixup+LS distortion, model not overfit, room to grow. Two changes:
#   1. image_size: 224 -> 256  (~30% more pixels per frame; same TSM-R50)
#   2. epochs:     220 -> 280  (warmup 15 -> 18; exp7 peaked at the edge)
# Reg/optim recipe held identical to exp7 so the delta attributes to scale.

defaults:
  - override /model: tsm_resnet50_transformer_mlp

dataset:
  num_frames: 4
  image_size: 256

training:
  optimizer: adamw
  lr: 5.0e-4
  backbone_lr: 2.0e-4
  weight_decay: 0.05
  batch_size: 16
  epochs: 280
  warmup_epochs: 18
  lr_schedule: cosine
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  ema: true
  ema_decay: 0.9995
  strong_clip_aug: true
  mixup_alpha: 0.2
  aux_loss:
    enabled: true
    weight: 0.3
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp9_tsm_r50_mlp_256_long.pt
  device: cuda

wandb:
  enabled: true
  run_name: resnet50-tsm-tf-mlp-aux-256-long
  tags: [track1, supervised, tsm, resnet50, transformer, mlp, aux, ema, long, res256]
