# @package _global_
# Exp4-1 (Track 1): same recipe as exp4_tsm_resnet18, but LR is held CONSTANT
# at the base value (1e-2) after the warmup phase — no cosine decay.
# Ablates the contribution of cosine decay to the from-scratch TSM-ResNet18 baseline.
defaults:
  - override /model: tsm_resnet18_meanpool

dataset:
  num_frames: 4

training:
  optimizer: sgd
  momentum: 0.9
  nesterov: true
  batch_size: 32
  lr: 1.0e-2
  lr_schedule: constant     # warmup → flat at base lr (vs. exp4's cosine)
  weight_decay: 5.0e-4
  epochs: 150
  warmup_epochs: 5
  label_smoothing: 0.1
  amp: true
  grad_clip: 20.0
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp4_1_tsm_constant_lr.pt
  device: cuda
  strong_clip_aug: true
  mixup_alpha: 0.2

wandb:
  enabled: true
  tags: [track1, supervised, tsm, resnet18, constant_lr]
