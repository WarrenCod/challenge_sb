# @package _global_
# Stage 1 — Masked Autoencoder pretraining on individual frames.
# Entry point: `python src/pretrain_mae.py experiment=mae_pretrain`

mae:
  image_size: 224
  patch_size: 16
  embed_dim: 384        # ViT-S width
  depth: 12             # ViT-S depth
  num_heads: 6          # ViT-S heads
  mlp_ratio: 4.0
  decoder_embed_dim: 192
  decoder_depth: 4
  decoder_num_heads: 6
  mask_ratio: 0.75
  norm_pix_loss: true

training:
  batch_size: 256
  base_lr: 1.5e-4       # effective lr = base_lr * batch_size / 256
  weight_decay: 0.05
  epochs: 400
  warmup_epochs: 40
  amp: true
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/mae_stage1.pt
  snapshot_every: 50    # save encoder every N epochs
