# @package _global_
# Stage 1 — iBOT (DINO + MIM) on individual frames.
# Entry point: `python src/pretrain_ibot.py experiment=ibot_pretrain`
# Saves the EMA teacher's encoder state under `encoder_state_dict` so Stage 2
# can load it via the existing ViTMAEEncoder.

ibot:
  global_size: 224
  local_size: 96
  patch_size: 16
  n_local_crops: 4              # DINO uses 8; we drop to 4 to fit time budget
  global_scale: [0.4, 1.0]
  local_scale: [0.05, 0.4]
  embed_dim: 384                # ViT-S
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  drop_path: 0.1
  out_dim: 8192                 # iBOT head output dim (prototypes)
  mask_ratio_min: 0.1
  mask_ratio_max: 0.5

training:
  batch_size: 256               # A5000 fits this with AMP at 4 local + 2 global
  base_lr: 5.0e-4               # effective lr = base_lr * batch_size / 256
  final_lr: 1.0e-6
  weight_decay: 0.04
  final_weight_decay: 0.4
  warmup_epochs: 10
  epochs: 100                   # ~30 h on A5000; bump to 150 if you have headroom
  amp: true
  num_workers: 8
  grad_clip: 3.0
  ema_momentum: 0.996           # cosine 0.996 → 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
  student_temp: 0.1
  center_momentum: 0.9
  mim_weight: 1.0
  freeze_last_layer_epochs: 1   # zero-grad on head's last_layer for the first N epochs (DINO trick)
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/ibot_stage1.pt
  snapshot_every: 25
  device: cuda

wandb:
  enabled: true
  tags: [track1, stage1, ibot]
