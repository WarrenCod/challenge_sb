# @package _global_
# exp9-attnpool-tier2 (Track 1, diagnostic): frozen V-JEPA Tier-2 encoder +
# attention pooling + linear classifier. Same recipe as exp9_vjepa_probe_tier2;
# only the spatial pool changes (mean_patches -> attn_pool). Result tells us
# whether the 8.4% probe ceiling on Tier-2 was a pooling bottleneck.
defaults:
  - override /model: vit_vjepa_attnpool_tier2

dataset:
  num_frames: 4

training:
  batch_size: 32
  lr: 1.0e-3
  llrd: 0.0
  epochs: 20
  warmup_epochs: 2
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  mixup_alpha: 0.0
  strong_clip_aug: false
  amp: true
  amp_dtype: bf16
  grad_clip: 1.0
  ema: false
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp9_vjepa_attnpool_tier2.pt
  device: cuda

wandb:
  enabled: true
  run_name: exp9_vjepa_attnpool_tier2
  tags: [track1, diagnostic, vjepa, tier2, attn-pool, frozen-encoder]
