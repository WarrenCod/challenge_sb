# @package _global_
# Exp12 (Track 1): exp9 recipe — single architectural change.
#
# Replaces the 2-layer frame-level Transformer (5 tokens: CLS + T=4 frames) with
# a 4-layer divided space-time Transformer over (T=4, H=8, W=8) = 256 patch
# tokens taken from the pre-pool layer4 feature map of the TSM-R50 backbone.
# Rationale: with T=4 hard cap, frame-level attention has nothing to mix; giving
# the head 2D spatial structure at every frame restores its ability to model
# fine-grained motion (which T=4 alone can't carry).
#
# Held identical to exp9 (so the win attributes to the head):
#   - TSM-R50 backbone, fold_div=8, from-scratch
#   - image_size=256, num_frames=4
#   - AdamW + 2-group LR (head 5e-4, backbone 2e-4), wd=0.05
#   - cosine 280 ep / 18 warmup, label_smoothing=0.1
#   - EMA 0.9995, aux per-frame CE weight 0.3
#   - ConsistentClipAug (no hflip — SSv2-safe)
#
# Cheap free-win mix-ins:
#   - cutmix_alpha=1.0 alternates 50/50 with mixup_alpha=0.2 (existing branch)
#   - stochastic depth 0→0.1 linear inside the ST transformer blocks
defaults:
  - override /model: tsm_r50_spacetime

dataset:
  num_frames: 4
  image_size: 256

training:
  optimizer: adamw
  lr: 5.0e-4
  backbone_lr: 2.0e-4
  weight_decay: 0.05
  batch_size: 12
  epochs: 280
  warmup_epochs: 18
  lr_schedule: cosine
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  ema: true
  ema_decay: 0.9995
  strong_clip_aug: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  aux_loss:
    enabled: true
    weight: 0.3
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp12_spacetime.pt
  device: cuda

wandb:
  enabled: true
  run_name: tsm-r50-spacetime-256
  tags: [track1, supervised, tsm, resnet50, spacetime, transformer, mlp, aux, ema, long, res256]
