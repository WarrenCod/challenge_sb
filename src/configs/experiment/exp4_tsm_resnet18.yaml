# @package _global_
# Exp4 (Track 1): TSM-ResNet18 trained from scratch with heavy clip-consistent
# augmentation + Mixup. Single-stage supervised training; no SSL pretraining.
# This is the "fully-supervised from scratch" floor that the SSL routes
# (Exp1/2/3) should beat — it tells us how much SSL is buying.
defaults:
  - override /model: tsm_resnet18_meanpool

dataset:
  num_frames: 4

training:
  optimizer: sgd
  momentum: 0.9
  nesterov: true
  batch_size: 32
  lr: 1.0e-2                # SGD recipe; linear-scale if you change batch size
  weight_decay: 5.0e-4
  epochs: 150               # from-scratch needs the time
  warmup_epochs: 5
  label_smoothing: 0.1
  amp: true
  grad_clip: 20.0
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp4_tsm_resnet18.pt
  device: cuda
  strong_clip_aug: true     # RandomResizedCrop + ColorJitter + RandAugment + RandomErasing
  mixup_alpha: 0.2          # batch-level Mixup

wandb:
  enabled: true
  tags: [track1, supervised, tsm, resnet18]
