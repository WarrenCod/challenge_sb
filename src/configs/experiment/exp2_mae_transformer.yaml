# @package _global_
# Exp2 (Track 1): MAE-pretrained ViT-S + 2-layer temporal transformer head.
#   - Same encoder as Exp1; only the temporal head differs (order-aware vs mean-pool).
#   - Exp1↔Exp2 delta = pure measurement of "does temporal modeling help".
defaults:
  - override /model: vit_mae_transformer

dataset:
  num_frames: 4

training:
  batch_size: 16
  lr: 1.0e-3
  llrd: 0.75
  epochs: 50
  warmup_epochs: 5
  weight_decay: 0.05
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp2_mae_transformer.pt
  device: cuda

wandb:
  enabled: true
  tags: [track1, stage2, mae, transformer]
