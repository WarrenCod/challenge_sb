# @package _global_
# Exp11 (Track 1, diagnostic): flow-only stream from scratch.
#
# Hypothesis: does the optical-flow stream alone reach a useful accuracy at
# 4 frames (3 dx/dy pairs) on this SSv2-style dataset? Decides whether
# two-stream is worth pursuing further.
#
# frames -> Farneback flow (3 frames, 2 ch) -> R18-TSM -> Transformer-2L -> MLP -> 33-way
#
# Differs from exp9 (RGB R50): smaller backbone (R18, in_channels=2),
# smaller temporal/classifier widths (256 vs 512), flow-aware data path
# (no RandAugment, no hflip, RRC + RandomErasing only).
#
# Decision rule on completion:
#   val acc >= 0.40 -> fusion is promising; design exp12 joint-from-scratch.
#   val acc 0.20-0.30 -> flow is a weak modality at 4 frames; abandon two-stream.
#   val acc < 0.15 -> kill the line.

defaults:
  - override /model: flow_tsm_r18

dataset:
  num_frames: 4
  image_size: 256
  modality: flow

training:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 0.05
  batch_size: 16
  epochs: 120
  warmup_epochs: 8
  lr_schedule: cosine
  label_smoothing: 0.1
  amp: true
  grad_clip: 1.0
  num_workers: 8
  ema: true
  ema_decay: 0.9995
  mixup_alpha: 0.2
  aux_loss:
    enabled: true
    weight: 0.3
  checkpoint_path: ${hydra:runtime.cwd}/checkpoints/exp11_flow_only.pt
  device: cuda
  resume: true

wandb:
  enabled: true
  run_name: flow-only-tsm-r18-256
  run_id: exp11_flow_only
  tags: [track1, supervised, flow_only, tsm, resnet18, diagnostic, res256]
