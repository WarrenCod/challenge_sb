# @package _global_
dataset:
  # Train split: used by train.py with split_train_val (hold-out val for training curves).
  train_dir: ${hydra:runtime.cwd}/processed_data/train
  # Full validation split: used by evaluate.py (no random split; entire folder).
  val_dir: ${hydra:runtime.cwd}/processed_data/val
  # Test frames root for create_submission.py
  test_dir: ${hydra:runtime.cwd}/processed_data/test
  submission_output: ${hydra:runtime.cwd}/processed_data/submission.csv

  num_frames: 4
  val_ratio: 0.2
  seed: 42
  max_samples: null
  # Test-time augmentation for create_submission.py: list of temporal offsets
  # (in fractions of a frame-step) to average. Default [0.0] = no TTA.
  # Example: [-0.5, 0.0, 0.5] for 3-clip averaging.
  tta_offsets: [0.0]
